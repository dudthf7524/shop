<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    list.html
    <div th:replace="~{nav.html :: navbar}"></div>
    <table>
        <tr>
            <td>번호</td>
            <td>상품명</td>
            <td>상품가격</td>
        </tr>

      <tr th:each="item: ${list}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.title}">></td>
            <td th:text="${item.price}">></td>
       </tr>

    </table>
</body>
</html>
