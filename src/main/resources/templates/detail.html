<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    .detail {
        text-align : center;
    }
    .detail img{
        max-width : 30%;
        display : block;
        margin : auto;
    }
</style>
<body>
<div class="detail">
    <h4>상세페이지</h4>
    <img src="https://placehold.co/300">
    <h4 th:text = "${item.title}"></h4>
    <p th:text = "${item.price}"></p>
</div>
</body>
</html>
